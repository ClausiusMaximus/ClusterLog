<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ClusterLog</title>

    <meta name="theme-color" content="#0d47a1">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body>

<header>
    <h1>ClusterLog</h1>
</header>

<main id="app">

    <section class="card">

        <h2>Neuer Angriff</h2>

        <div class="form-group">
            <button id="nowButton" class="btn-primary">
                📅 Jetzt
            </button>
        </div>

        <div class="form-group">
            <label for="attackDate">Datum</label>
            <input id="attackDate" type="date">
        </div>

        <div class="form-group">
            <label for="attackTime">Uhrzeit</label>
            <input id="attackTime" type="time" step="1">
        </div>

    </section>

  <section class="card">

    <h2>Dauer</h2>

    <div class="duration-controls">

        <button id="minus60">-60</button>
        <button id="minus10">-10</button>
        <button id="minus1">-1</button>

    </div>

    <div class="duration-display">

        <span id="durationValue">0</span>

        <div>Sekunden</div>

    </div>

    <div class="duration-controls">

        <button id="plus1">+1</button>
        <button id="plus10">+10</button>
        <button id="plus60">+60</button>

    </div>

</section>

    </section>

    <section class="card">

        <h2>KIP-Skala</h2>

        <div class="kip-grid">

            <button class="kip-btn">0</button>
            <button class="kip-btn">1</button>
            <button class="kip-btn">2</button>
            <button class="kip-btn">3</button>
            <button class="kip-btn">4</button>
            <button class="kip-btn">5</button>
            <button class="kip-btn">6</button>
            <button class="kip-btn">7</button>
            <button class="kip-btn">8</button>
            <button class="kip-btn">9</button>
            <button class="kip-btn">10</button>

        </div>

    </section>

    <button class="btn-primary">
        💾 Angriff speichern
    </button>

</main>

<nav>
    <button>Erfassen</button>
    <button>Verlauf</button>
    <button>Statistik</button>
</nav>

<script type="module" src="js/app.js"></script>


</body>
</html>
