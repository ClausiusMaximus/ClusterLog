<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClusterLog</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🧠 ClusterLog</h1>
</header>

<nav>

<button id="dashboardBtn">🏠 Dashboard</button>

<button id="newBtn">➕ Neue Attacke</button>

<button id="calendarBtn">📅 Kalender</button>

<button id="statsBtn">📊 Statistik</button>


</nav>

<main>

<section id="dashboardPage" class="page active">

<h2>Willkommen 👋</h2>

<p>ClusterLog ist bereit.</p>

</section>


<section id="newPage" class="page">

<h2>Neue Attacke</h2>

<div class="card">

<label>Datum</label>
<input type="date" id="attackDate">

<label>Uhrzeit</label>
<input type="time" id="attackTime" step="1">

<button class="smallButton" id="nowButton">
Jetzt übernehmen
</button>

</div>

<div class="card">

<h3>KIP</h3>

<div id="kipGrid"></div>

</div>

<div class="card">

<h3>Dauer</h3>

<div class="durationRow">

<button id="minus10">-10</button>

<button id="minus1">-1</button>

<span id="durationValue">

0 s

</span>

<button id="plus1">+1</button>

<button id="plus10">+10</button>

</div>

</div>

<div class="card">

<h3>Kopfseite</h3>

<div id="sideButtons">

<button data-side="Links">Links</button>

<button data-side="Rechts">Rechts</button>

<button data-side="Beidseitig">Beidseitig</button>

</div>

</div>

<button id="saveAttack">

💾 Speichern

</button>

</section>


<section id="calendarPage" class="page">

<h2>Kalender</h2>

<p>Hier entsteht der Monatskalender.</p>

</section>


<section id="statsPage" class="page">

<h2>Statistik</h2>

<p>Hier entstehen die Auswertungen.</p>

</section>

</main>

<script src="js/models.js"></script>
<script src="js/storage.js"></script>
<script src="app.js"></script>

</body>
</html>
