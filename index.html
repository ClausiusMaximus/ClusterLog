<!DOCTYPE html>
<html lang="de">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ClusterLog v0.3.5 Stable</title>

    <meta name="theme-color"
          content="#2563eb">

    <meta name="description"
          content="Clusterkopfschmerz-Tagebuch">

    <link rel="manifest"
          href="manifest.json">

    <link rel="stylesheet"
          href="css/variables.css">

    <link rel="stylesheet"
          href="css/base.css">

    <link rel="stylesheet"
          href="css/app.css">

</head>

<body>

<header>

    <h1>ClusterLog</h1>

</header>

<main id="app">

<!-- =====================================
     ERFASSEN
===================================== -->

<section
    id="captureView"
    class="view active">

    <div class="card">

        <h2>Neuen Angriff erfassen</h2>

        <button
            id="nowButton"
            class="btn-primary">

            📅 Jetzt übernehmen

        </button>

        <div class="form-group">

            <label for="attackDate">

                Datum

            </label>

            <input
                id="attackDate"
                type="date">

        </div>

        <div class="form-group">

            <label for="attackTime">

                Uhrzeit

            </label>

            <input
                id="attackTime"
                type="time"
                step="1">

        </div>

    </div>

    <div class="card">

        <h2>Dauer</h2>

        <div class="duration-row">

            <button id="minus60">

                -60

            </button>

            <button id="minus10">

                -10

            </button>

            <button id="minus1">

                -1

            </button>

            <div
                id="durationValue"
                class="duration-display">

                00:00:00

            </div>

            <button id="plus1">

                +1

            </button>

            <button id="plus10">

                +10

            </button>

            <button id="plus60">

                +60

            </button>

        </div>

    </div>

    <div class="card">

        <h2>KIP-Skala</h2>

        <div class="kip-grid">

            <button class="kip-btn" data-kip="0">0</button>
            <button class="kip-btn" data-kip="1">1</button>
            <button class="kip-btn" data-kip="2">2</button>
            <button class="kip-btn" data-kip="3">3</button>
            <button class="kip-btn" data-kip="4">4</button>
            <button class="kip-btn" data-kip="5">5</button>

            <button class="kip-btn" data-kip="6">6</button>
            <button class="kip-btn" data-kip="7">7</button>
            <button class="kip-btn" data-kip="8">8</button>
            <button class="kip-btn" data-kip="9">9</button>
            <button class="kip-btn" data-kip="10">10</button>

        </div>

    </div>

    <button
        id="saveButton"
        class="btn-primary">

        💾 Angriff speichern

    </button>

</section>
<!-- =====================================
     VERLAUF
===================================== -->

<section
    id="historyView"
    class="view hidden">

    <div class="card">

        <h2>Verlauf</h2>

        <div id="historyList">

            <div class="empty-state">

                Noch keine Angriffe gespeichert.

            </div>

        </div>

    </div>

</section>

<!-- =====================================
     STATISTIK
===================================== -->

<section
    id="statisticsView"
    class="view hidden">

    <div class="card">

        <h2>Statistik</h2>

        <div class="stats-grid">

            <div class="stat-card">

                <div
                    id="statToday"
                    class="stat-value">

                    0

                </div>

                <div class="stat-label">

                    Heute

                </div>

            </div>

            <div class="stat-card">

                <div
                    id="statWeek"
                    class="stat-value">

                    0

                </div>

                <div class="stat-label">

                    Diese Woche

                </div>

            </div>

            <div class="stat-card">

                <div
                    id="statMonth"
                    class="stat-value">

                    0

                </div>

                <div class="stat-label">

                    Dieser Monat

                </div>

            </div>

            <div class="stat-card">

                <div
                    id="statAverage"
                    class="stat-value">

                    00:00:00

                </div>

                <div class="stat-label">

                    Ø Dauer

                </div>

            </div>

        </div>

    </div>

</section>

</main>

<!-- =====================================
     NAVIGATION
===================================== -->

<nav>

    <button
        id="navCapture"
        class="active">

        📝<br>

        Erfassen

    </button>

    <button
        id="navHistory">

        📋<br>

        Verlauf

    </button>

    <button
        id="navStatistics">

        📊<br>

        Statistik

    </button>

</nav>

<!-- =====================================
     TOAST
===================================== -->

<div
    id="toast"
    class="toast">

</div>

<script
    type="module"
    src="js/app.js">

</script>

</body>

</html>
