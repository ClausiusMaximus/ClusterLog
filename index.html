<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ClusterLog</title>

    <meta name="theme-color" content="#0d47a1">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/app.css">
</head>

<body>

<header>
    <h1>ClusterLog</h1>
</header>

<main id="app">

    <section class="card">

        <h2>Neuer Angriff</h2>

        <div class="form-group">
            <label>Datum</label>

            <input
                id="attackDate"
                type="date">
        </div>

        <div class="form-group">
            <label>Uhrzeit</label>

            <input
                id="attackTime"
                type="time">
        </div>

        <button
            id="nowButton"
            class="btn-primary">

            Jetzt

        </button>

    </section>

</main>

<nav>
    <button>Erfassen</button>
    <button>Verlauf</button>
    <button>Statistik</button>
</nav>

<script type="module" src="js/app.js"></script>


</body>
</html>
